<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Pong Modern</title>
<style>
    body {
        margin: 0;
        background: radial-gradient(circle, #1a1a2e, #0f3460);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial;
        color: white;
    }
    canvas {
        border: 3px solid #00f5d4;
        box-shadow: 0 0 30px #00f5d4;
        border-radius: 10px;
    }
</style>
</head>
<body>

<canvas id="pong" width="900" height="500"></canvas>

<script>
const canvas = document.getElementById("pong");
const ctx = canvas.getContext("2d");

const ball = {
    x: canvas.width/2,
    y: canvas.height/2,
    radius: 8,
    speed: 6,
    velocityX: 6,
    velocityY: 4
};

const player = {
    x: 10,
    y: canvas.height/2 - 50,
    width: 10,
    height: 100,
    score: 0
};

const cpu = {
    x: canvas.width - 20,
    y: canvas.height/2 - 50,
    width: 10,
    height: 100,
    score: 0
};

function drawRect(x,y,w,h,color){
    ctx.fillStyle = color;
    ctx.fillRect(x,y,w,h);
}

function drawCircle(x,y,r){
    ctx.fillStyle = "#00f5d4";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#00f5d4";
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
}

function drawNet(){
    for(let i=0;i<canvas.height;i+=20){
        drawRect(canvas.width/2 -1,i,2,10,"#aaa");
    }
}

canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    player.y = e.clientY - rect.top - player.height/2;
});

function collision(b,p){
    return b.x - b.radius < p.x + p.width &&
           b.x + b.radius > p.x &&
           b.y - b.radius < p.y + p.height &&
           b.y + b.radius > p.y;
}

function resetBall(){
    ball.x = canvas.width/2;
    ball.y = canvas.height/2;
    ball.velocityX *= -1;
    ball.speed = 6;
}

function update(){
    ball.x += ball.velocityX;
    ball.y += ball.velocityY;

    // pareti
    if(ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height){
        ball.velocityY *= -1;
    }

    // punteggio
    if(ball.x < 0){
        cpu.score++;
        resetBall();
    } else if(ball.x > canvas.width){
        player.score++;
        resetBall();
    }

    // AI
    cpu.y += (ball.y - (cpu.y + cpu.height/2)) * 0.08;

    // collisione
    let p = (ball.x < canvas.width/2) ? player : cpu;

    if(collision(ball,p)){
        let collidePoint = ball.y - (p.y + p.height/2);
        collidePoint /= p.height/2;

        let angle = collidePoint * Math.PI/4;
        let direction = (ball.x < canvas.width/2) ? 1 : -1;

        ball.velocityX = direction * ball.speed * Math.cos(angle);
        ball.velocityY = ball.speed * Math.sin(angle);

        ball.speed += 0.3;
    }
}

function draw(){
    // sfondo
    drawRect(0,0,canvas.width,canvas.height,"#0f2027");

    drawNet();

    // punteggio
    ctx.font = "40px Arial";
    ctx.fillText(player.score, canvas.width/4, 50);
    ctx.fillText(cpu.score, 3*canvas.width/4, 50);

    // paddles
    drawRect(player.x,player.y,player.width,player.height,"#00f5d4");
    drawRect(cpu.x,cpu.y,cpu.width,cpu.height,"#ff4d6d");

    drawCircle(ball.x,ball.y,ball.radius);
}

function game(){
    update();
    draw();
    requestAnimationFrame(game);
}

game();
</script>

</body>
</html>
